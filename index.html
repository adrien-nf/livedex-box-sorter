<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Box Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Pokémon Box Finder</h1>
  <p class="subtitle" id="boxCapSubtitle">Boxes hold 30 Pokémon each</p>

  <select id="dexSelect"><option value="national">National</option></select>

  <div class="toggle-row">
    <input type="radio" id="modePoke" name="mode" value="pokemon" checked>
    <label for="modePoke">Pokémon</label>
    <input type="radio" id="modeBox" name="mode" value="box">
    <label for="modeBox">Box #</label>
  </div>

  <div class="toggle-row" id="layoutToggle" style="display:none">
    <input type="radio" id="layoutReg" name="layout" value="regional" checked>
    <label for="layoutReg">Regional boxes</label>
    <input type="radio" id="layoutNat" name="layout" value="national">
    <label for="layoutNat">National boxes</label>
  </div>

  <div class="input-row">
    <input id="searchInput" type="text" placeholder="Name or #001" autofocus />
    <button class="go-btn" onclick="lookup()">Go</button>
  </div>
  <div id="error" class="error"></div>

  <div id="card" class="card"></div>

  <script src="app.js"></script>
</body>
</html>
